name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }} · go ${{ matrix.go }})
    defaults:
      run:
        shell: bash # Git Bash on Windows too, so the script steps below stay portable
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ['1.21.x', 'stable'] # floor (go.mod directive) + latest stable
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          check-latest: true
      - name: build
        run: go build ./...
      - name: vet
        run: go vet ./...
      - name: gofmt
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then echo "needs gofmt:"; echo "$out"; exit 1; fi
      - name: go.mod tidy is clean
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
      - name: test (race)
        run: go test -race -count=1 ./...
      # Turso integration is gated by env (MQLITE_TEST_DB) and runs in the
      # nightly workflow, not here — keeps PRs hermetic and off the remote quota.
      # Coverage is measured once in the dedicated `coverage` job below.

  coverage:
    name: coverage (per-package gate, cross-package)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: test with coverage
        # -coverpkg over the product packages (not the test/ helper programs) so
        # cross-package execution is credited: e.g. the SDK broker round-trip test
        # exercises — and counts toward — the server handlers it calls (MQLITE-26).
        run: |
          pkgs=$(go list ./... | grep -v '/test/' | paste -sd, -)
          go test -covermode=atomic -coverpkg="$pkgs" -coverprofile=coverage.out -count=1 ./... | tee cover.txt
      - name: report + gate
        run: |
          # Per-package statement coverage from the merged -coverpkg profile: dedup
          # blocks by id (a block repeats per test binary), covered if any binary hit it.
          awk 'NR>1{ key=$1; stmt[key]=$2; if($3>0) cov[key]=1 }
          END{
            for(k in stmt){ f=k; sub(/:[0-9].*/,"",f);
              n=split(f,p,"/"); pkg=""; for(i=4;i<n;i++) pkg=pkg (pkg==""?"":"/") p[i];
              if(pkg=="")pkg="root"; if(pkg ~ /^test\//) continue;
              tot[pkg]+=stmt[k]; if(cov[k]) c[pkg]+=stmt[k]; gt+=stmt[k]; if(cov[k]) gc+=stmt[k]; }
            for(pp in tot) printf "%-12s %5.1f %d/%d\n", pp, 100*c[pp]/tot[pp], c[pp], tot[pp];
            printf "%-12s %5.1f %d/%d\n", "TOTAL", 100*gc/gt, gc, gt;
          }' coverage.out | sort > pkgcov.txt
          {
            echo '### Coverage (cross-package, product code)'
            echo '```'
            awk '{printf "%-12s %5s%% (%s)\n",$1,$2,$3}' pkgcov.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          cat pkgcov.txt
          # Floors sit a few points below current coverage to absorb drift; raise as
          # coverage grows. A drop below any floor fails the build (MQLITE-26).
          awk '
            BEGIN{ floor["TOTAL"]=65; floor["engine"]=72; floor["server"]=62;
                   floor["cmd/mqlite"]=52; floor["root"]=55; floor["wire"]=90 }
            { got[$1]=$2+0 }
            END{ bad=0;
              for(p in floor){
                if(!(p in got)){ printf "::error::no coverage for %s\n",p; bad=1; continue }
                if(got[p] < floor[p]){ printf "::error::%s %.1f%% below %d%% floor\n",p,got[p],floor[p]; bad=1 }
                else printf "ok  %-12s %.1f%% >= %d%%\n",p,got[p],floor[p] }
              exit bad }' pkgcov.txt
      - name: upload to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out
          slug: mqlitehq/mqlite
          fail_ci_if_error: false # don't fail the build on a Codecov upload hiccup
      - name: html report
        run: go tool cover -html=coverage.out -o coverage.html
      - uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: |
            coverage.out
            coverage.html

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable # latest patch -> stdlib CVEs already fixed
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  docker:
    name: docker build + healthz smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: build image
        run: docker build --platform linux/amd64 -t mqlite:ci .
      - name: run + /healthz smoke
        run: |
          docker run -d --name mq -p 8080:8080 mqlite:ci
          ok=""
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/healthz >/dev/null; then ok=1; break; fi
            sleep 1
          done
          if [ -z "$ok" ]; then echo "healthz never came up"; docker logs mq; exit 1; fi
          echo "healthz OK"
          docker rm -f mq
