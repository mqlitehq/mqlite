name: release image

# Build the broker image and push it to this repo's GitHub Container Registry
# (ghcr.io/mqlitehq/mqlite) on every v* tag. It can also be dispatched manually with
# a `version` input — used to backfill a tag that was cut before this workflow
# existed (e.g. v0.1.0): the build then runs from the current branch, whose runtime
# binary is identical to that tag.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'image version, e.g. 0.1.0 (blank → derived from the v* tag)'
        required: false

permissions:
  contents: read
  packages: write

jobs:
  ghcr:
    name: build + push multi-arch image (GHCR)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - id: ver
        name: compute image tags
        run: |
          v='${{ github.event.inputs.version }}'
          [ -z "$v" ] && v="${GITHUB_REF_NAME#v}"
          img="ghcr.io/${{ github.repository }}"
          tags="${img}:${v},${img}:${v%.*}"          # full version + major.minor
          case "$v" in *-*) ;; *) tags="${tags},${img}:latest" ;; esac  # no latest for prereleases
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"
          echo "building ${img} — tags: ${tags}"
      - uses: docker/setup-buildx-action@v3
      - name: log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Pure-Go cross-compile (Dockerfile uses BUILDPLATFORM + GOARCH=$TARGETARCH),
      # so amd64 + arm64 build natively without QEMU emulation.
      - name: build + push (linux/amd64, linux/arm64)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.ver.outputs.tags }}
