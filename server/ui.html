<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>mqlite · 运维面</title>
<style>
  :root{--blue:#2563eb;--sky:#38bdf8;--amber:#facc15;--ink:#0f172a;--muted:#64748b;--bg:#f4f7fb;--card:#fff;--border:#e2e8f0;--green:#16a34a;--red:#dc2626}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg)}
  header{background:linear-gradient(135deg,#0b1220,#15233f);color:#fff;padding:14px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  header h1{font-size:18px;margin:0;font-weight:700}
  header .sub{color:#9fb4d6;font-size:12.5px}
  header .auth{margin-left:auto;display:flex;gap:8px;align-items:center}
  header input{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:8px;padding:6px 10px;font-size:13px;width:230px}
  header input::placeholder{color:#8aa0c4}
  button{cursor:pointer;border:1px solid var(--border);background:#fff;border-radius:8px;padding:6px 12px;font-size:13px;font-weight:600;color:#334155}
  button:hover{background:#f1f5fb}
  button.primary{background:var(--blue);border-color:var(--blue);color:#fff}
  button.danger{background:#fef2f2;border-color:#fecaca;color:var(--red)}
  main{max-width:1100px;margin:0 auto;padding:18px 20px 60px}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  @media(max-width:820px){.row{grid-template-columns:1fr}}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:18px}
  .card h2{font-size:14px;margin:0 0 10px;color:#334155;display:flex;justify-content:space-between;align-items:center}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:7px 9px;border-bottom:1px solid var(--border)}
  th{font-size:11.5px;color:var(--muted);font-weight:700}
  tr.q{cursor:pointer}tr.q:hover{background:#f1f5fb}tr.q.sel{background:#eaf2fe}
  td.num{text-align:right;font-variant-numeric:tabular-nums}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:1px 7px;border-radius:999px}
  .pill.active{background:#dcfce7;color:#15803d}.pill.locked{background:#fef9c3;color:#854d0e}
  .pill.deferred{background:#e0e7ff;color:#3730a3}.pill.scheduled{background:#cffafe;color:#155e75}
  .pill.dead_lettered{background:#fee2e2;color:#991b1b}
  .controls{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
  select{border:1px solid var(--border);border-radius:8px;padding:5px 8px;font-size:13px}
  .body{font-family:ui-monospace,Menlo,monospace;font-size:12px;color:#475569;max-width:340px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .muted{color:var(--muted)}.err{color:var(--red);font-size:13px}
  .empty{color:var(--muted);font-size:13px;padding:8px 2px}
  .badge-ro{font-size:11px;color:#9fb4d6;border:1px solid rgba(255,255,255,.2);border-radius:999px;padding:2px 8px}
</style>
</head>
<body>
<header>
  <svg width="30" height="30" viewBox="0 0 64 64" aria-label="mqlite"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#38bdf8"/><stop offset="1" stop-color="#2563eb"/></linearGradient></defs><rect x="4" y="4" width="56" height="56" rx="15" fill="url(#g)"/><circle cx="17" cy="32" r="3.2" fill="#fff" opacity=".5"/><circle cx="27" cy="32" r="3.2" fill="#fff" opacity=".75"/><circle cx="37" cy="32" r="3.2" fill="#fff"/><path d="M43 32 h3" stroke="#facc15" stroke-width="2.8" stroke-linecap="round"/><circle cx="50" cy="32" r="4" fill="#facc15"/></svg>
  <div><h1>mqlite 运维面</h1><div class="sub">只读 · 队列 / 计数 / 浏览消息（唯一写动作 = DLQ Redrive）</div></div>
  <span class="badge-ro">read-only</span>
  <div class="auth">
    <input id="token" type="password" placeholder="Bearer token（无鉴权可留空）">
    <button class="primary" onclick="loadQueues()">刷新</button>
  </div>
</header>
<main>
  <div id="err" class="err"></div>
  <div class="row">
    <div class="card">
      <h2>队列 <span class="muted" id="qcount"></span></h2>
      <div id="queues"><div class="empty">点「刷新」加载（先填 token）</div></div>
    </div>
    <div class="card">
      <h2><span id="peekTitle">消息浏览</span></h2>
      <div class="controls" id="peekControls" style="display:none">
        <span class="muted">状态</span>
        <select id="state" onchange="peekSel()">
          <option value="">全部</option><option value="active">active</option>
          <option value="locked">locked</option><option value="deferred">deferred</option>
          <option value="scheduled">scheduled</option><option value="dead_lettered">dead_lettered</option>
        </select>
        <button onclick="peekSel()">浏览</button>
        <button class="danger" id="redriveBtn" style="display:none" onclick="redrive()">Redrive DLQ → active</button>
      </div>
      <div id="messages"><div class="empty">点左侧队列查看消息</div></div>
    </div>
  </div>
</main>
<script>
  const $=id=>document.getElementById(id);
  const base=location.origin;
  let sel=null;
  $('token').value=localStorage.getItem('mqlite_token')||'';

  async function api(path,body){
    const tok=$('token').value.trim();
    localStorage.setItem('mqlite_token',tok);
    const h={'Content-Type':'application/json'};
    if(tok) h['Authorization']='Bearer '+tok;
    const r=await fetch(base+path,{method:'POST',headers:h,body:JSON.stringify(body||{})});
    const t=await r.text();
    let j={}; try{j=t?JSON.parse(t):{}}catch(e){}
    if(!r.ok) throw new Error((j.code||r.status)+': '+(j.message||t));
    return j;
  }
  function err(e){ $('err').textContent=e?('⚠ '+e):''; }

  async function loadQueues(){
    err('');
    try{
      const {queues=[]}=await api('/mqlite.v1.AdminService/ListQueues',{});
      $('qcount').textContent='('+queues.length+')';
      if(!queues.length){ $('queues').innerHTML='<div class="empty">没有队列</div>'; return; }
      // fetch metrics per queue (concurrently)
      const metrics=await Promise.all(queues.map(q=>api('/mqlite.v1.QueueService/Stats',{queue:q.name}).catch(()=>({}))));
      let html='<table><tr><th>名称</th><th>类型</th><th class="num">active</th><th class="num">locked</th><th class="num">defer</th><th class="num">sched</th><th class="num">DLQ</th><th class="num">total</th></tr>';
      queues.forEach((q,i)=>{const m=metrics[i];
        html+=`<tr class="q" data-q="${q.name}" onclick="selectQ('${q.name}',this)">`+
          `<td><b>${q.name}</b></td><td class="muted">${q.kind}</td>`+
          `<td class="num">${m.active||0}</td><td class="num">${m.locked||0}</td><td class="num">${m.deferred||0}</td>`+
          `<td class="num">${m.scheduled||0}</td><td class="num">${m.dead_lettered||0}</td><td class="num">${m.total||0}</td></tr>`;});
      html+='</table>';
      $('queues').innerHTML=html;
    }catch(e){ err(e.message); }
  }

  function selectQ(name,tr){
    sel=name;
    document.querySelectorAll('tr.q').forEach(x=>x.classList.toggle('sel',x===tr));
    $('peekTitle').textContent='消息浏览 · '+name;
    $('peekControls').style.display='flex';
    peekSel();
  }

  async function peekSel(){
    if(!sel) return;
    err('');
    const state=$('state').value;
    $('redriveBtn').style.display = state==='dead_lettered' ? 'inline-block':'none';
    try{
      const {messages=[]}=await api('/mqlite.v1.QueueService/Peek',{queue:sel,state,max:50});
      if(!messages.length){ $('messages').innerHTML='<div class="empty">（空）</div>'; return; }
      let html='<table><tr><th>seq</th><th>状态</th><th class="num">投递</th><th>message_id</th><th>body</th></tr>';
      messages.forEach(m=>{let b='';try{b=atob(m.body||'')}catch(e){b=m.body||''}
        html+=`<tr><td class="num">${m.seq_number}</td><td><span class="pill ${m.state}">${m.state}</span></td>`+
          `<td class="num">${m.delivery_count||0}</td><td class="muted">${m.message_id||''}</td>`+
          `<td class="body" title="${escapeAttr(b)}">${escapeHtml(b)}</td></tr>`;});
      html+='</table>';
      $('messages').innerHTML=html;
    }catch(e){ err(e.message); }
  }

  async function redrive(){
    if(!sel) return;
    if(!confirm('把 '+sel+' 的死信批量回流到 active？')) return;
    try{
      const {moved}=await api('/mqlite.v1.AdminService/Redrive',{queue:sel});
      err('');
      alert('已回流 '+(moved||0)+' 条');
      loadQueues(); peekSel();
    }catch(e){ err(e.message); }
  }

  function escapeHtml(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
  function escapeAttr(s){return escapeHtml(s).replace(/"/g,'&quot;');}

  if($('token').value) loadQueues();
</script>
</body>
</html>
